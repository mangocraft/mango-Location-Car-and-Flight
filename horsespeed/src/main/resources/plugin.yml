name: BmwSpeed
version: '${project.version}'
main: com.bmwspeed.BmwSpeed
api-version: '1.21'
author: BmwSpeed Team
description: 完全支持 Folia 的线程安全插件 - 把游戏里的马包装成现代的宝马汽车
folia-supported: true
depend: [MangoLocation]
softdepend: [Vault]

commands:
  carspeed:
    description: BmwSpeed 主命令
    aliases: [cs, bmwspeed]
    permission: bmwspeed.admin
    permission-message: 你没有权限使用此命令！
  addgas:
    description: 给宝马跑车加油
    permission: bmwspeed.use
    permission-message: 你没有权限使用此命令！
  bmwspeedreload:
    description: 重载 BmwSpeed 配置文件
    aliases: [bsreload]
    permission: bmwspeed.reload
    permission-message: 你没有权限使用此命令！

permissions:
  bmwspeed.admin:
    description: 管理员权限
    default: op
  bmwspeed.reload:
    description: 重载配置文件权限
    default: op
  bmwspeed.use:
    description: 使用加油指令
    default: true
  bmwspeed.vipdrive.5:
    description: 5 级宝马免费驾驶
    default: false
  bmwspeed.vipdrive.6:
    description: 6 级宝马免费驾驶
    default: false
