# 只有主世界执行下方行政区多边形检测。
main-world: "world"

# 主世界中未被下方多边形覆盖的地方统一归入远郊。
main-world-outside-area:
  id: "outskirts"
  name: "远郊"

# 其他世界直接作为一个区域返回；未列出的自定义世界使用其真实世界名。
world-display-names:
  world_nether: "地狱"
  world_the_end: "末地"

# priority 数字越小，边界重叠时越优先。
tracking:
  notify-player: true
  enter-message: "&a你已进入 &e{area}"
  leave-message: "&7你已离开 &e{area}"
  area-messages:
    san_cheng:
      enter:
        - "&6✦ 魅力三城，灯火如昼，欢迎来到三城区。"
        - "&7三江风月入长街，一城烟火候君来。"
      leave:
        - "&7你已离开三城区。"
        - "&8回首长街灯未眠，且携清风赴前川。"
    huadu:
      enter:
        - "&d✿ 魅力花都，芳华满城，欢迎来到花都区。"
        - "&7花影随风铺锦路，满城春色待君游。"
      leave:
        - "&7你已离开花都区。"
        - "&8花香尚在衣襟上，前路清风亦有情。"
    Hutong:
      enter:
        - "&b✦ 魅力互通，通衢八方，欢迎来到互通区。"
        - "&7长路交汇连南北，一程风景共云天。"
      leave:
        - "&7你已离开互通区。"
        - "&8此去千程皆坦荡，愿君一路有清风。"
    outskirts:
      enter:
        - "&a❧ 魅力远郊，山野舒展，欢迎来到远郊。"
        - "&7远山含黛接晴野，陌上清风伴客行。"
      leave:
        - "&7你已离开远郊。"
        - "&8云影留痕辞旷野，灯火在前候归人。"

areas:
  Hutong:
    name: "互通区"
    enabled: true
    priority: 10
    shape:
      - { x: 5348, z: 4892 }
      - { x: -2968, z: 4892 }
      - { x: -2968, z: -4368 }
      - { x: 5349, z: -4359 }

  san_cheng:
    name: "三城区"
    enabled: true
    priority: 20
    shape:
      - { x: 10032, z: 14080 }
      - { x: -3120, z: 13888 }
      - { x: -2968, z: 4892 }
      - { x: 10032, z: 4892 }

  huadu:
    name: "花都区"
    enabled: true
    priority: 30
    shape:
      - { x: 5348, z: 4892 }
      - { x: 5348, z: -4359 }
      - { x: 17348, z: -4359 }
